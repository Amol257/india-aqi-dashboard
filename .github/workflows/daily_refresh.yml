name: Daily AQI Data Refresh + Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Run every day at 06:30 IST (01:00 UTC)
  schedule:
    - cron: "0 1 * * *"

  # Also run on every push to main (so deploys stay fast)
  push:
    branches: [main]

  # Allow manual trigger from the GitHub UI
  workflow_dispatch:

permissions:
  contents: write      # needed to commit updated data
  pages: write
  id-token: write

jobs:
  # ── 1. Fetch fresh AQI data & commit it ────────────────────────────────────
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch & process AQI data
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        run: python scripts/fetch_aqi_data.py

      - name: Sync static constants
        run: python scripts/sync_constants.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/local_aqi.json src/constants.ts
          # Only commit if the files actually changed
          if git diff --cached --quiet; then
            echo "No changes – skipping commit."
          else
            git commit -m "chore: refresh AQI data and constants $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

  # ── 2. Build & deploy to GitHub Pages ──────────────────────────────────────
  build-and-deploy:
    needs: refresh-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull the freshly committed data from the previous job
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /india-aqi-dashboard-v2/

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
